<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>🔥 FIRE DETECTION AI</title>

    <!-- ONNX RUNTIME -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <!-- FONT FUTURISTIC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#050505;

            color:white;

            font-family:'Orbitron',sans-serif;

            display:flex;

            flex-direction:column;

            align-items:center;

            justify-content:center;

            min-height:100vh;

            overflow:hidden;

            transition:0.3s;
        }

        /* BACKGROUND GLOW */

        body::before{

            content:'';

            position:fixed;

            width:600px;

            height:600px;

            background:red;

            filter:blur(220px);

            opacity:0.15;

            top:-200px;

            left:-200px;

            z-index:-1;
        }

        /* TITLE */

        h1{

            font-size:3rem;

            margin-top:20px;

            color:#ff3b30;

            text-shadow:
                0 0 10px red,
                0 0 30px red,
                0 0 60px red;
        }

        .creator{

            margin-top:10px;

            margin-bottom:20px;

            color:#888;

            letter-spacing:2px;
        }

        /* STATUS BOX */

        #status{

            margin-bottom:20px;

            padding:15px 30px;

            border-radius:15px;

            background:#111;

            border:2px solid #333;

            font-size:1.1rem;

            box-shadow:
                0 0 20px rgba(255,255,255,0.1);

            transition:0.3s;
        }

        /* BUTTON */

        .btn-start{

            padding:15px 40px;

            border:none;

            border-radius:15px;

            cursor:pointer;

            background:
                linear-gradient(
                    45deg,
                    #ff3b30,
                    #ff6a00
                );

            color:white;

            font-size:1rem;

            font-weight:bold;

            margin-bottom:25px;

            transition:0.3s;

            box-shadow:
                0 0 20px red;
        }

        .btn-start:hover{

            transform:scale(1.05);

            box-shadow:
                0 0 40px red;
        }

        /* CAMERA CONTAINER */

        .container{

            position:relative;

            width:720px;

            height:540px;

            border-radius:25px;

            overflow:hidden;

            border:3px solid #ff3b30;

            background:black;

            box-shadow:
                0 0 20px red,
                0 0 60px rgba(255,0,0,0.5);
        }

        /* VIDEO */

        video,
        canvas#overlay{

            position:absolute;

            width:100%;

            height:100%;

            top:0;

            left:0;
        }

        /* HUD CORNER */

        .hud-corner{

            position:absolute;

            width:40px;

            height:40px;

            border:4px solid red;

            z-index:20;
        }

        .top-left{
            top:10px;
            left:10px;
            border-right:none;
            border-bottom:none;
        }

        .top-right{
            top:10px;
            right:10px;
            border-left:none;
            border-bottom:none;
        }

        .bottom-left{
            bottom:10px;
            left:10px;
            border-right:none;
            border-top:none;
        }

        .bottom-right{
            bottom:10px;
            right:10px;
            border-left:none;
            border-top:none;
        }

        /* SCAN LINE EFFECT */

        .scanline{

            position:absolute;

            width:100%;

            height:4px;

            background:
                rgba(255,0,0,0.7);

            box-shadow:
                0 0 20px red;

            animation:scan 3s linear infinite;

            z-index:15;
        }

        @keyframes scan{

            0%{
                top:0;
            }

            100%{
                top:100%;
            }
        }

        /* FOOTER */

        .footer{

            margin-top:20px;

            color:#666;

            font-size:0.8rem;

            letter-spacing:2px;
        }

    </style>

</head>

<body>

    <!-- TITLE -->

    <h1>🔥 FIRE DETECTION AI</h1>

    <p class="creator">
        CYBER SECURITY SYSTEM
    </p>

    <!-- BUTTON -->

    <button
        id="btn-init"
        class="btn-start"
    >
        🎥 AKTIFKAN KAMERA
    </button>

    <!-- STATUS -->

    <div id="status">

        🟢 SISTEM SIAGA

    </div>

    <!-- CAMERA AREA -->

    <div class="container">

        <!-- VIDEO -->
        <video
            id="webcam"
            autoplay
            playsinline
            muted
        ></video>

        <!-- DETECTION CANVAS -->
        <canvas
            id="overlay"
            width="720"
            height="540"
        ></canvas>

        <!-- HUD -->
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div>
        <div class="hud-corner bottom-right"></div>

        <!-- SCANLINE -->
        <div class="scanline"></div>

    </div>

    <!-- HIDDEN PROCESSOR -->
    <canvas
        id="processor"
        width="640"
        height="640"
        style="display:none;"
    ></canvas>

    <!-- ALARM AUDIO -->
    <audio
        id="alarmSound"
        src="alarm.mp3"
        preload="auto"
        loop
    ></audio>

    <!-- FOOTER -->

    <div class="footer">

        AI POWERED SURVEILLANCE • YOLO ONNX • REALTIME DETECTION

    </div>

    <!-- APP JS -->
    <script src="app.js"></script>

</body>

</html>
